{% extends 'base.html' %}
{% block title %}Form Create Product{% endblock %}

{% block content %}
    <h1 class="font-bold">Create Order</h1>
        <form method="POST">
            {% csrf_token %}
            <ul>
                 <div class="bg-white text-blue-900 p-2">
                    <li class="bg-gray p-2 ml-2 rounded shadow border border-gray-900 hover:bg-gray-300"><p class="font-bold">Metodo de pago:{{form.payment_method}}</p></li>
                    <li class="bg-gray p-2 ml-2 rounded shadow border border-gray-900 hover:bg-gray-300"><p class="font-bold">Status:{{form.status}}</p></li>
                    <li class="bg-gray p-2 ml-2 rounded shadow border border-gray-900 hover:bg-gray-300"><p class="font-bold">precio total:{{form.order_total}}</p></li>
                    <li class="bg-gray p-2 ml-2 rounded shadow border border-gray-900 hover:bg-gray-300"><p class="font-bold">perfil:{{form.profile}}</p></li>
                    <button type="submit" class="bg-gray-100 p-4 rounded shadow border border-gray-700 hover:bg-gray-500 hover:text-violet-300">Guardar</button>
                </div>
            </ul>
        </form>
    
{% endblock %}
